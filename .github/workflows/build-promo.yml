name: Build Promo (No License)

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Promo build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-2022]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Always build from main so Mac/Win use the same build_installer_* scripts as the main workflow
        # (manual runs otherwise use whichever branch is selected in the UI and can miss fixes).
        ref: main
        submodules: recursive

    - name: Enable promo (no-license) build
      shell: bash
      run: touch .wolf_author_build

    - name: Setup CMake
      if: runner.os == 'macOS'
      uses: lukka/get-cmake@latest

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

    - name: Enable MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: cmake --build build --config Release --parallel 4

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: cmake --build build --parallel 4

    - name: Import macOS Signing Certificate
      if: runner.os == 'macOS'
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
        APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
      run: |
        security create-keychain -p "build_keychain_pw" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "build_keychain_pw" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

        # Import Developer ID Application cert
        echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k build.keychain \
          -P "${APPLE_CERTIFICATE_PASSWORD}" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign
        rm -f certificate.p12

        # Import Developer ID Installer cert (separate secret)
        if [ -n "$APPLE_INSTALLER_CERTIFICATE" ]; then
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > installer_certificate.p12
          security import installer_certificate.p12 \
            -k build.keychain \
            -P "${APPLE_INSTALLER_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/productsign
          rm -f installer_certificate.p12
          echo "Installer certificate imported."
        else
          echo "WARNING: APPLE_INSTALLER_CERTIFICATE_BASE64 not set - productsign will fail."
        fi

        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s -k "build_keychain_pw" \
          build.keychain
        echo "Certificate(s) imported."

    - name: Sign, Package, Notarize & Staple (macOS)
      if: runner.os == 'macOS'
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        chmod +x build_installer_mac_signed.sh
        ./build_installer_mac_signed.sh

    - name: Azure Login
      if: runner.os == 'Windows'
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign Binaries (VST3 / Standalone)
      if: runner.os == 'Windows'
      uses: azure/artifact-signing-action@v1.2.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://prodeastus.codesigning.azure.net
        certificate-profile-name: WolfPaccAudioSignature
        signing-account-name: WolfPaccSigning
        files-folder: ${{ github.workspace }}/build/HowlingWolves_artefacts
        files-folder-filter: dll,exe,vst3
        files-folder-recurse: true
        cache-dependencies: 'false'

    - name: Install Inno Setup
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress --ignore-checksums
        echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Build Installer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: ./build_installer_win.ps1

    - name: Stage installer for signing
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force _sign_installer | Out-Null
        Copy-Item -Force "HowlingWolves_Win_Installer.exe" "_sign_installer/"

    - name: Sign Installer (EXE)
      if: runner.os == 'Windows'
      uses: azure/artifact-signing-action@v1.2.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://prodeastus.codesigning.azure.net
        certificate-profile-name: WolfPaccAudioSignature
        signing-account-name: WolfPaccSigning
        files-folder: ${{ github.workspace }}/_sign_installer
        files-folder-filter: exe
        files-folder-recurse: false
        cache-dependencies: 'false'

    - name: Copy signed installer
      if: runner.os == 'Windows'
      shell: pwsh
      run: Copy-Item -Force "_sign_installer/HowlingWolves_Win_Installer.exe" "${{ github.workspace }}/"

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path artifacts) { Remove-Item -Recurse -Force artifacts }
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null
        $art = "build/HowlingWolves_artefacts"
        if (Test-Path "$art/Release/VST3") {
          Copy-Item -Path "$art/Release/VST3/*" -Destination "artifacts" -Recurse -Force
          Get-ChildItem "$art/Release/Standalone" -Filter "*.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination "artifacts" -Force
        } elseif (Test-Path "$art/VST3") {
          Copy-Item -Path "$art/VST3/*" -Destination "artifacts" -Recurse -Force
          Get-ChildItem "$art/Standalone" -Filter "*.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination "artifacts" -Force
        }
        if (Test-Path "DistributionContent") {
          Copy-Item -Path "DistributionContent" -Destination "artifacts/DistributionContent" -Recurse -Force
        }
        if (Test-Path "INSTALL.txt") { Copy-Item "INSTALL.txt" "artifacts/" -Force }
        Compress-Archive -Path "artifacts\*" -DestinationPath "HowlingWolves_Promo_Windows.zip" -Force

    - name: Upload Promo Installer (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-Promo-MacOS-pkg
        path: "Installer/output_signed/Howling Wolves Installer.pkg"
        if-no-files-found: error
