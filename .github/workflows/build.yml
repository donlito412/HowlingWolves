name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2022: stable VS2022 + Ninja; avoids windows-latest image churn.
        os: [macos-latest, windows-2022]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Latest CMake on macOS only. Windows uses the runner CMake (pairs correctly with VS).
    - name: Setup CMake
      if: runner.os == 'macOS'
      uses: lukka/get-cmake@latest

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

    - name: Enable MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        cmake --version
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: cmake --build build --config Release --parallel 4

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: cmake --build build --parallel 4

    - name: List build artifacts
      shell: bash
      run: |
        echo "=== Build output structure ==="
        find build/HowlingWolves_artefacts -type f \( -name "*.vst3" -o -name "*.component" -o -name "*.app" -o -name "*.exe" -o -name "*.dll" \) 2>/dev/null || echo "No artefacts directory found"

    # Same-repo PRs get secrets; fork PRs do not.
    - name: Azure Login
      if: runner.os == 'Windows' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign Binaries (VST3 / Standalone)
      if: runner.os == 'Windows' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: azure/artifact-signing-action@v1.2.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://prodeastus.codesigning.azure.net
        certificate-profile-name: WolfPaccAudioSignature
        signing-account-name: WolfPaccSigning
        files-folder: ${{ github.workspace }}/build/HowlingWolves_artefacts
        files-folder-filter: dll,exe,vst3
        files-folder-recurse: true
        cache-dependencies: 'false'

    - name: Install Inno Setup
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress --ignore-checksums
        echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Build Installer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: ./build_installer_win.ps1

    - name: Stage installer for signing
      if: runner.os == 'Windows' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      shell: pwsh
      run: |
        if (-not (Test-Path "HowlingWolves_Win_Installer.exe")) {
          Write-Error "HowlingWolves_Win_Installer.exe missing after Inno build."
          exit 1
        }
        New-Item -ItemType Directory -Force _sign_installer | Out-Null
        Copy-Item -Force "HowlingWolves_Win_Installer.exe" "_sign_installer/"

    - name: Sign Installer (EXE)
      if: runner.os == 'Windows' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: azure/artifact-signing-action@v1.2.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://prodeastus.codesigning.azure.net
        certificate-profile-name: WolfPaccAudioSignature
        signing-account-name: WolfPaccSigning
        files-folder: ${{ github.workspace }}/_sign_installer
        files-folder-filter: exe
        files-folder-recurse: false
        cache-dependencies: 'false'

    - name: Copy signed installer to repo root
      if: runner.os == 'Windows' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      shell: pwsh
      run: Copy-Item -Force "_sign_installer/HowlingWolves_Win_Installer.exe" "${{ github.workspace }}/"

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path artifacts) { Remove-Item -Recurse -Force artifacts }
        New-Item -ItemType Directory -Force -Path artifacts | Out-Null
        $art = "build/HowlingWolves_artefacts"
        if (Test-Path "$art/Release/VST3") {
          Copy-Item -Path "$art/Release/VST3/*" -Destination "artifacts" -Recurse -Force
          Get-ChildItem "$art/Release/Standalone" -Filter "*.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination "artifacts" -Force
        } elseif (Test-Path "$art/VST3") {
          Copy-Item -Path "$art/VST3/*" -Destination "artifacts" -Recurse -Force
          Get-ChildItem "$art/Standalone" -Filter "*.exe" -ErrorAction SilentlyContinue | Copy-Item -Destination "artifacts" -Force
        }
        if (Test-Path "DistributionContent") {
          Copy-Item -Path "DistributionContent" -Destination "artifacts/DistributionContent" -Recurse -Force
        }
        if (Test-Path "INSTALL.txt") { Copy-Item "INSTALL.txt" "artifacts/" -Force }
        $items = Get-ChildItem artifacts -ErrorAction SilentlyContinue
        if (-not $items) {
          Write-Error "artifacts folder is empty — Windows build output path may have changed."
          exit 1
        }
        Remove-Item -Force HowlingWolves_Windows.zip -ErrorAction SilentlyContinue
        $seven = "${env:ProgramFiles}\7-Zip\7z.exe"
        if (Test-Path $seven) {
          & $seven a -tzip -r "HowlingWolves_Windows.zip" ".\artifacts\*"
        } else {
          Compress-Archive -Path "artifacts\*" -DestinationPath "HowlingWolves_Windows.zip" -Force
        }

    - name: Sign and Notarize (macOS)
      if: runner.os == 'macOS' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      env:
        APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      run: |
        # Import certificate into temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        KEYCHAIN_PASS=$(openssl rand -hex 16)
        echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
        security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
        security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
          -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

        # Must match Keychain identity exactly (set APPLE_CODESIGN_IDENTITY secret, or default below).
        if [ -n "$APPLE_CODESIGN_IDENTITY" ]; then
          SIGN_ID="$APPLE_CODESIGN_IDENTITY"
        else
          SIGN_ID="Developer ID Application: Jonathan Freeman ($APPLE_TEAM_ID)"
        fi

        # Sign VST3
        find build/HowlingWolves_artefacts -name "*.vst3" | while read bundle; do
          codesign --deep --force --verify --verbose \
            --sign "$SIGN_ID" \
            --options runtime \
            --timestamp \
            "$bundle"
        done

        # Sign AU component
        find build/HowlingWolves_artefacts -name "*.component" | while read bundle; do
          codesign --deep --force --verify --verbose \
            --sign "$SIGN_ID" \
            --options runtime \
            --timestamp \
            "$bundle"
        done

        # Sign Standalone app
        find build/HowlingWolves_artefacts -name "*.app" | while read bundle; do
          codesign --deep --force --verify --verbose \
            --sign "$SIGN_ID" \
            --options runtime \
            --timestamp \
            "$bundle"
        done

    - name: Package (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p artifacts
        if [ -d "build/HowlingWolves_artefacts/Release/VST3" ]; then
          cp -R "build/HowlingWolves_artefacts/Release/VST3/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/Release/Standalone/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/Release/AU/"* artifacts/ 2>/dev/null || true
        elif [ -d "build/HowlingWolves_artefacts/VST3" ]; then
          cp -R "build/HowlingWolves_artefacts/VST3/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/Standalone/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/AU/"* artifacts/ 2>/dev/null || true
        fi
        if [ -d "DistributionContent" ]; then
          cp -R DistributionContent artifacts/DistributionContent
        fi
        cp INSTALL.txt artifacts/ 2>/dev/null || true
        cd artifacts && zip -r ../HowlingWolves_MacOS.zip . && cd ..

    - name: Notarize (macOS)
      if: runner.os == 'macOS' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        xcrun notarytool submit HowlingWolves_MacOS.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-windows-latest
        path: artifacts
        if-no-files-found: error

    - name: Upload Windows zip (release bundle)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-windows-zip
        path: HowlingWolves_Windows.zip
        if-no-files-found: error

    - name: Upload Windows Installer
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-Installer-Win
        path: HowlingWolves_Win_Installer.exe
        if-no-files-found: error

    - name: Upload macOS artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-macos-latest
        path: artifacts
        if-no-files-found: error

    - name: Upload macOS zip (release bundle)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-macos-zip
        path: HowlingWolves_MacOS.zip
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts (Windows folder)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-windows-latest
          path: windows-files

      - name: Download Artifacts (Windows zip)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-windows-zip
          path: windows-zip-dir

      - name: Download Artifacts (Installer)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-Installer-Win
          path: installer-files

      - name: Download Artifacts (macOS folder)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-macos-latest
          path: macos-files

      - name: Download Artifacts (macOS zip)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-macos-zip
          path: macos-zip-dir

      - name: Stage release files
        run: |
          cp "windows-zip-dir/HowlingWolves_Windows.zip" .
          cp "macos-zip-dir/HowlingWolves_MacOS.zip" .
          cp "installer-files/HowlingWolves_Win_Installer.exe" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HowlingWolves_Windows.zip
            HowlingWolves_MacOS.zip
            HowlingWolves_Win_Installer.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
