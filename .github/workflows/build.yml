name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: List build artifacts
      shell: bash
      run: |
        echo "=== Build output structure ==="
        find build/HowlingWolves_artefacts -type f \( -name "*.vst3" -o -name "*.component" -o -name "*.app" -o -name "*.exe" -o -name "*.dll" \) 2>/dev/null || echo "No artefacts directory found"

    # --- WINDOWS SIGNING & INSTALLER STEPS ---
    
    - name: Azure Login
      if: runner.os == 'Windows'
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign Binaries (VST3/DLL)
      if: runner.os == 'Windows'
      uses: azure/trusted-signing-action@v0
      with:
        endpoint: https://prodeastus.codesigning.azure.net
        certificate-profile-name: WolfPaccAudioSignature
        trusted-signing-account-name: WolfPaccSigning
        files-folder: build/HowlingWolves_artefacts
        files-folder-filter: dll,exe
        files-folder-recurse: true

    - name: Install Inno Setup
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Build Installer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: ./build_installer_win.ps1

    - name: Sign Installer (EXE)
      if: runner.os == 'Windows'
      uses: azure/trusted-signing-action@v0
      with:
        endpoint: https://prodeastus.codesigning.azure.net
        certificate-profile-name: WolfPaccAudioSignature
        trusted-signing-account-name: WolfPaccSigning
        files-folder: .
        files-folder-filter: exe
        files-folder-recurse: false

    # --- PACKAGING ---

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p artifacts
        if [ -d "build/HowlingWolves_artefacts/Release/VST3" ]; then
          cp -r "build/HowlingWolves_artefacts/Release/VST3/"* artifacts/ 2>/dev/null || true
          cp "build/HowlingWolves_artefacts/Release/Standalone/"*.exe artifacts/ 2>/dev/null || true
        elif [ -d "build/HowlingWolves_artefacts/VST3" ]; then
          cp -r "build/HowlingWolves_artefacts/VST3/"* artifacts/ 2>/dev/null || true
          cp "build/HowlingWolves_artefacts/Standalone/"*.exe artifacts/ 2>/dev/null || true
        fi
        if [ -d "DistributionContent" ]; then
          cp -R DistributionContent artifacts/DistributionContent
        fi
        cp INSTALL.txt artifacts/ 2>/dev/null || true
        7z a HowlingWolves_Windows.zip ./artifacts/*

    - name: Package (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p artifacts
        if [ -d "build/HowlingWolves_artefacts/Release/VST3" ]; then
          cp -R "build/HowlingWolves_artefacts/Release/VST3/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/Release/Standalone/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/Release/AU/"* artifacts/ 2>/dev/null || true
        elif [ -d "build/HowlingWolves_artefacts/VST3" ]; then
          cp -R "build/HowlingWolves_artefacts/VST3/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/Standalone/"* artifacts/ 2>/dev/null || true
          cp -R "build/HowlingWolves_artefacts/AU/"* artifacts/ 2>/dev/null || true
        fi
        if [ -d "DistributionContent" ]; then
          cp -R DistributionContent artifacts/DistributionContent
        fi
        cp INSTALL.txt artifacts/ 2>/dev/null || true
        cd artifacts && zip -r ../HowlingWolves_MacOS.zip . && cd ..

    # --- UPLOAD ARTIFACTS ---

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-windows-latest
        path: artifacts/*
        if-no-files-found: error

    - name: Upload Windows Installer
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-Installer-Win
        path: HowlingWolves_Win_Installer.exe
        if-no-files-found: error

    - name: Upload macOS artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-macos-latest
        path: artifacts/*
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-windows-latest
          path: windows-files

      - name: Download Artifacts (Installer)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-Installer-Win
          path: installer-files

      - name: Download Artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-macos-latest
          path: macos-files

      - name: Create release ZIPs
        run: |
          cd windows-files && zip -r ../HowlingWolves_Windows.zip . && cd ..
          cd macos-files && zip -r ../HowlingWolves_MacOS.zip . && cd ..
          cp installer-files/HowlingWolves_Win_Installer.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HowlingWolves_Windows.zip
            HowlingWolves_MacOS.zip
            HowlingWolves_Win_Installer.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
