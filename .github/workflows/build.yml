name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: List build artifacts (Debug)
        shell: bash
        run: |
          echo "=== Build output structure ==="
          find build/HowlingWolves_artefacts -type f \( -name "*.vst3" -o -name "*.component" -o -name "*.app" -o -name "*.exe" -o -name "*.dll" \) 2>/dev/null || echo "No artefacts directory found"
          echo "=== Full artefacts tree ==="
          ls -R build/HowlingWolves_artefacts/ 2>/dev/null || echo "Directory not found"

      # ---------------------------------------------------------------
      # macOS: Import certificates and sign all bundles
      # ---------------------------------------------------------------
      - name: Import certificates (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Strip whitespace/newlines from base64 before decoding (fixes SecKeychainItemImport errors)
          echo "$MACOS_CERTIFICATE" | tr -d '\n\r ' | base64 --decode > app_cert.p12
          security import app_cert.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -A
          rm app_cert.p12

          echo "$MACOS_INSTALLER_CERTIFICATE" | tr -d '\n\r ' | base64 --decode > installer_cert.p12
          security import installer_cert.p12 -k build.keychain \
            -P "$MACOS_INSTALLER_CERTIFICATE_PWD" \
            -T /usr/bin/pkgbuild -T /usr/bin/productbuild -A
          rm installer_cert.p12

          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Sign macOS bundles
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
            <key>com.apple.security.device.audio-input</key>
            <true/>
          </dict>
          </plist>
          EOF

          sign_bundle() {
            local bundle="$1"
            echo "Signing: $bundle"
            codesign --force --deep --options runtime \
              --entitlements entitlements.plist \
              --sign "$APPLE_SIGNING_IDENTITY" \
              "$bundle"
          }

          find build/HowlingWolves_artefacts -name "*.vst3" -maxdepth 5 -type d | while read b; do sign_bundle "$b"; done
          find build/HowlingWolves_artefacts -name "*.component" -maxdepth 5 -type d | while read b; do sign_bundle "$b"; done
          find build/HowlingWolves_artefacts -name "*.app" -maxdepth 5 -type d | while read b; do sign_bundle "$b"; done

      # ---------------------------------------------------------------
      # macOS: Build and sign .pkg installer
      # ---------------------------------------------------------------
      - name: Create macOS installer pkg
        if: runner.os == 'macOS'
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          VERSION="1.0.20"
          mkdir -p pkg_stage/VST3/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg_stage/AU/Library/Audio/Plug-Ins/Components
          mkdir -p pkg_stage/App/Applications
          mkdir -p "pkg_stage/Content/Library/Application Support/WolfInstruments/HowlingWolves"

          find build/HowlingWolves_artefacts -name "*.vst3" -maxdepth 5 -type d \
            -exec cp -R {} pkg_stage/VST3/Library/Audio/Plug-Ins/VST3/ \;
          find build/HowlingWolves_artefacts -name "*.component" -maxdepth 5 -type d \
            -exec cp -R {} pkg_stage/AU/Library/Audio/Plug-Ins/Components/ \;
          find build/HowlingWolves_artefacts -name "*.app" -maxdepth 5 -type d \
            -exec cp -R {} pkg_stage/App/Applications/ \;
          cp -R DistributionContent \
            "pkg_stage/Content/Library/Application Support/WolfInstruments/HowlingWolves/"

          pkgbuild --root pkg_stage/VST3 \
            --identifier com.wolfinstruments.howlingwolves.vst3 \
            --version "$VERSION" --install-location / pkg_vst3.pkg
          pkgbuild --root pkg_stage/AU \
            --identifier com.wolfinstruments.howlingwolves.au \
            --version "$VERSION" --install-location / pkg_au.pkg
          pkgbuild --root pkg_stage/App \
            --identifier com.wolfinstruments.howlingwolves.app \
            --version "$VERSION" --install-location / pkg_app.pkg
          pkgbuild --root pkg_stage/Content \
            --identifier com.wolfinstruments.howlingwolves.content \
            --version "$VERSION" --install-location / pkg_content.pkg

          cat > distribution.xml << DISTEOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
            <title>Howling Wolves</title>
            <organization>com.wolfinstruments</organization>
            <domains enable_localSystem="true"/>
            <options customize="never" require-scripts="false" rootVolumeOnly="true"/>
            <pkg-ref id="com.wolfinstruments.howlingwolves.vst3"/>
            <pkg-ref id="com.wolfinstruments.howlingwolves.au"/>
            <pkg-ref id="com.wolfinstruments.howlingwolves.app"/>
            <pkg-ref id="com.wolfinstruments.howlingwolves.content"/>
            <choices-outline>
              <line choice="default">
                <line choice="com.wolfinstruments.howlingwolves.vst3"/>
                <line choice="com.wolfinstruments.howlingwolves.au"/>
                <line choice="com.wolfinstruments.howlingwolves.app"/>
                <line choice="com.wolfinstruments.howlingwolves.content"/>
              </line>
            </choices-outline>
            <choice id="default"/>
            <choice id="com.wolfinstruments.howlingwolves.vst3" visible="false">
              <pkg-ref id="com.wolfinstruments.howlingwolves.vst3"/>
            </choice>
            <choice id="com.wolfinstruments.howlingwolves.au" visible="false">
              <pkg-ref id="com.wolfinstruments.howlingwolves.au"/>
            </choice>
            <choice id="com.wolfinstruments.howlingwolves.app" visible="false">
              <pkg-ref id="com.wolfinstruments.howlingwolves.app"/>
            </choice>
            <choice id="com.wolfinstruments.howlingwolves.content" visible="false">
              <pkg-ref id="com.wolfinstruments.howlingwolves.content"/>
            </choice>
            <pkg-ref id="com.wolfinstruments.howlingwolves.vst3" version="$VERSION" onConclusion="none">pkg_vst3.pkg</pkg-ref>
            <pkg-ref id="com.wolfinstruments.howlingwolves.au" version="$VERSION" onConclusion="none">pkg_au.pkg</pkg-ref>
            <pkg-ref id="com.wolfinstruments.howlingwolves.app" version="$VERSION" onConclusion="none">pkg_app.pkg</pkg-ref>
            <pkg-ref id="com.wolfinstruments.howlingwolves.content" version="$VERSION" onConclusion="none">pkg_content.pkg</pkg-ref>
          </installer-gui-script>
          DISTEOF

          productbuild \
            --distribution distribution.xml \
            --package-path . \
            --sign "$APPLE_INSTALLER_IDENTITY" \
            "HowlingWolves_Installer.pkg"

      # ---------------------------------------------------------------
      # macOS: Notarize and staple
      # ---------------------------------------------------------------
      - name: Notarize and staple (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "HowlingWolves_Installer.pkg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "HowlingWolves_Installer.pkg"
          find build/HowlingWolves_artefacts -name "*.app" -maxdepth 5 -type d -exec xcrun stapler staple {} \;
          find build/HowlingWolves_artefacts -name "*.vst3" -maxdepth 5 -type d -exec xcrun stapler staple {} \;
          find build/HowlingWolves_artefacts -name "*.component" -maxdepth 5 -type d -exec xcrun stapler staple {} \;

      # ---------------------------------------------------------------
      # Package
      # ---------------------------------------------------------------
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -d "build/HowlingWolves_artefacts/Release/VST3" ]; then
            cp -r "build/HowlingWolves_artefacts/Release/VST3/"* artifacts/ 2>/dev/null || true
            cp "build/HowlingWolves_artefacts/Release/Standalone/"*.exe artifacts/ 2>/dev/null || true
          elif [ -d "build/HowlingWolves_artefacts/VST3" ]; then
            cp -r "build/HowlingWolves_artefacts/VST3/"* artifacts/ 2>/dev/null || true
            cp "build/HowlingWolves_artefacts/Standalone/"*.exe artifacts/ 2>/dev/null || true
          fi
          if [ -d "DistributionContent" ]; then
            cp -R DistributionContent artifacts/DistributionContent
          fi
          cp INSTALL.txt artifacts/ 2>/dev/null || true
          7z a HowlingWolves_Windows.zip ./artifacts/*

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          if [ -d "build/HowlingWolves_artefacts/Release/VST3" ]; then
            cp -R "build/HowlingWolves_artefacts/Release/VST3/"* artifacts/ 2>/dev/null || true
            cp -R "build/HowlingWolves_artefacts/Release/Standalone/"* artifacts/ 2>/dev/null || true
            cp -R "build/HowlingWolves_artefacts/Release/AU/"* artifacts/ 2>/dev/null || true
          elif [ -d "build/HowlingWolves_artefacts/VST3" ]; then
            cp -R "build/HowlingWolves_artefacts/VST3/"* artifacts/ 2>/dev/null || true
            cp -R "build/HowlingWolves_artefacts/Standalone/"* artifacts/ 2>/dev/null || true
            cp -R "build/HowlingWolves_artefacts/AU/"* artifacts/ 2>/dev/null || true
          fi
          if [ -d "DistributionContent" ]; then
            cp -R DistributionContent artifacts/DistributionContent
          fi
          cp HowlingWolves_Installer.pkg artifacts/ 2>/dev/null || true
          cp INSTALL.txt artifacts/ 2>/dev/null || true
          cd artifacts && zip -r ../HowlingWolves_MacOS.zip . && cd ..

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HowlingWolves-windows-latest
          path: artifacts/*
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: HowlingWolves-macos-latest
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-windows-latest
          path: windows-files

      - name: Download Artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-macos-latest
          path: macos-files

      - name: Create release ZIPs
        run: |
          cd windows-files && zip -r ../HowlingWolves_Windows.zip . && cd ..
          cd macos-files && zip -r ../HowlingWolves_MacOS.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HowlingWolves_Windows.zip
            HowlingWolves_MacOS.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
