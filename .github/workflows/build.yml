name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: List build artifacts (Debug)
      shell: bash
      run: |
        echo "=== Build output structure ==="
        find build/HowlingWolves_artefacts -type f -name "*.vst3" -o -name "*.component" -o -name "*.app" -o -name "*.exe" -o -name "*.dll" 2>/dev/null || echo "No artefacts directory found"
        echo "=== Full artefacts tree ==="
        ls -R build/HowlingWolves_artefacts/ 2>/dev/null || echo "Directory not found"

    - name: Import macOS Signing Certificate
      if: runner.os == 'macOS'
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
        APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
      run: |
        security create-keychain -p "build_keychain_pw" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "build_keychain_pw" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

        # Import Developer ID Application cert
        echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k build.keychain \
          -P "${APPLE_CERTIFICATE_PASSWORD}" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign
        rm -f certificate.p12

        # Import Developer ID Installer cert (separate secret)
        if [ -n "$APPLE_INSTALLER_CERTIFICATE" ]; then
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > installer_certificate.p12
          security import installer_certificate.p12 \
            -k build.keychain \
            -P "${APPLE_INSTALLER_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/productsign
          rm -f installer_certificate.p12
          echo "Installer certificate imported."
        else
          echo "WARNING: APPLE_INSTALLER_CERTIFICATE_BASE64 not set - productsign will fail."
        fi

        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s -k "build_keychain_pw" \
          build.keychain
        echo "Certificate(s) imported."

    - name: Sign, Package, Notarize & Staple (macOS)
      if: runner.os == 'macOS'
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        chmod +x build_installer_mac_signed.sh
        ./build_installer_mac_signed.sh

    - name: Azure Login (Windows)
      if: runner.os == 'Windows'
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign VST3 with Azure Trusted Signing (Windows)
      if: runner.os == 'Windows'
      uses: azure/trusted-signing-action@v0.5.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://eus.codesigning.azure.net/
        trusted-signing-account-name: WolfPaccSigning
        certificate-profile-name: WolfPaccAudioSignature
        files-folder: ${{ github.workspace }}/build/HowlingWolves_artefacts/Release/VST3
        files-folder-filter: vst3
        files-folder-recurse: true
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        mkdir -p artifacts
        if [ -d "build/HowlingWolves_artefacts/Release/VST3" ]; then
          cp -r "build/HowlingWolves_artefacts/Release/VST3/"* artifacts/ 2>/dev/null || true
          cp -r "build/HowlingWolves_artefacts/Release/Standalone/"* artifacts/ 2>/dev/null || true
        elif [ -d "build/HowlingWolves_artefacts/VST3" ]; then
          cp -r "build/HowlingWolves_artefacts/VST3/"* artifacts/ 2>/dev/null || true
          cp -r "build/HowlingWolves_artefacts/Standalone/"* artifacts/ 2>/dev/null || true
        fi
        7z a HowlingWolves_Windows.zip ./artifacts/*

    - name: Upload Artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-windows-latest
        path: HowlingWolves_Windows.zip

    - name: Upload Artifacts (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: HowlingWolves-macos-latest
        path: "Installer/output_signed/Howling Wolves Installer.pkg"

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-windows-latest

      - name: Download Artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: HowlingWolves-macos-latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HowlingWolves_Windows.zip
            Howling Wolves Installer.pkg
          fail_on_unmatched_files: false
          generate_release_notes: true
